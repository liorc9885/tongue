<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>משחק הלשון 🦎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; height: 100vh; height: 100dvh; height: calc(var(--vh, 1vh) * 100); }

        #game-container { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; height: 100dvh; height: calc(var(--vh, 1vh) * 100); }

        #three-canvas { display: block; width: 100%; height: 100%; }

        #tongue-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            pointer-events: none; z-index: 20;
            display: flex; flex-direction: column; align-items: center;
        }

        #target-word {
            margin-top: 15px; padding: 12px 40px;
            background: rgba(0,0,0,0.7); border-radius: 20px;
            color: #fff; font-size: 44px; font-weight: bold;
            text-shadow: 0 0 20px rgba(255,200,0,0.5);
            border: 2px solid rgba(255,200,0,0.4);
            direction: rtl; user-select: none;
            opacity: 0; transition: opacity 0.3s;
        }
        #target-word.visible { opacity: 1; }

        #lizard-container {
            margin-top: 10px; position: relative;
            width: 120px; height: 80px; user-select: none;
        }

        #lizard-body {
            width: 100px; height: 55px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border-radius: 50% 50% 45% 45%;
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            animation: lizardBob 2s ease-in-out infinite;
        }

        @keyframes lizardBob {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(3px); }
        }

        .lizard-eye {
            width: 18px; height: 20px;
            background: white; border-radius: 50%;
            position: absolute; top: 5px;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.2);
        }
        .lizard-eye.left { left: 18px; }
        .lizard-eye.right { right: 18px; }

        .lizard-pupil {
            width: 9px; height: 11px;
            background: #1a1a1a; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
        }

        #lizard-mouth {
            width: 8px; height: 8px;
            background: #E84057;
            border-radius: 50%;
            position: absolute; bottom: -2px; left: 50%;
            transform: translateX(-50%);
        }

        .lizard-foot {
            width: 14px; height: 8px;
            background: #388E3C;
            border-radius: 50%;
            position: absolute; bottom: -4px;
        }
        .lizard-foot.fl { left: 5px; }
        .lizard-foot.fr { right: 5px; }

        #score-display {
            position: absolute; top: 15px; left: 20px;
            color: #FFD700; font-size: 28px; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 20; user-select: none; direction: ltr;
        }

        #level-display {
            position: absolute; top: 15px; right: 20px;
            color: #FFD700; font-size: 24px; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 20; user-select: none; direction: rtl;
            background: rgba(0,0,0,0.5); padding: 4px 14px; border-radius: 12px;
        }

        #timer-display {
            position: absolute; top: 58px; right: 20px;
            color: #fff; font-size: 18px; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            z-index: 20; user-select: none; direction: ltr;
            background: rgba(0,0,0,0.45); padding: 3px 12px; border-radius: 10px;
            transition: color 0.3s;
        }
        #timer-display.urgent { color: #FF4444; animation: timerPulse 0.6s ease-in-out infinite; }
        @keyframes timerPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        #progress-display {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: #FFD700; font-size: 22px; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
            z-index: 20; user-select: none; direction: ltr;
            background: rgba(0,0,0,0.5); padding: 6px 20px; border-radius: 14px;
            border: 1px solid rgba(255,215,0,0.3);
        }

        #pause-btn {
            position: absolute; bottom: 20px; right: 20px;
            z-index: 25; pointer-events: auto;
            background: rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.4);
            color: #fff; font-size: 22px;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; user-select: none;
            display: flex; align-items: center; justify-content: center;
            transition: background 0.2s;
        }
        #pause-btn:hover { background: rgba(0,0,0,0.85); }

        #pause-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,10,30,0.75); z-index: 90;
            display: none; align-items: center; justify-content: center;
            flex-direction: column;
            color: #fff; font-size: 52px; font-weight: bold;
            text-shadow: 0 0 20px rgba(255,255,255,0.4);
            pointer-events: none;
        }
        #pause-overlay.visible { display: flex; }

        #feedback-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 15; pointer-events: none;
            opacity: 0; transition: opacity 0.15s;
        }
        #feedback-overlay.wrong { background: rgba(255,0,0,0.2); opacity: 1; }
        #feedback-overlay.correct { background: rgba(0,255,0,0.15); opacity: 1; }

        /* Shared overlay screen style */
        .overlay-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,10,30,0.92); z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
        }
        .overlay-screen h1 {
            font-size: 64px; color: #4CAF50;
            text-shadow: 0 0 30px rgba(76,175,80,0.5);
            margin-bottom: 10px;
        }
        .overlay-screen .subtitle {
            font-size: 28px; color: #aaa;
            margin-bottom: 40px; text-align: center; direction: rtl;
        }
        .overlay-screen .start-btn {
            font-size: 32px; color: #FFD700;
            padding: 15px 50px;
            border: 2px solid #FFD700;
            border-radius: 15px;
            animation: pulse 1.5s ease-in-out infinite;
            cursor: pointer;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        #start-screen h1 { color: #4CAF50; }
        #level-complete-screen h1 { color: #FFD700; text-shadow: 0 0 30px rgba(255,215,0,0.5); }
        #game-over-screen h1 { color: #FF4444; text-shadow: 0 0 30px rgba(255,68,68,0.5); }

        #instructions {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 14px;
            z-index: 20; user-select: none; pointer-events: none;
            text-align: center; direction: rtl;
            opacity: 0; transition: opacity 0.5s;
        }
        #instructions.visible { opacity: 1; }

        @media (max-width: 600px) {
            /* הקטנה של 10% אוטומטית בטלפון */
            #game-container { zoom: 0.9; }

            #target-word { font-size: 28px; padding: 8px 20px; margin-top: 8px; }
            #score-display { font-size: 20px; top: 10px; left: 10px; }
            #level-display { font-size: 18px; top: 10px; right: 10px; }
            #timer-display { font-size: 15px; top: 48px; right: 10px; }
            /* הזזת אלמנטי תחתית מעל ה-home indicator של iOS */
            #progress-display { font-size: 15px; bottom: calc(15px + env(safe-area-inset-bottom, 0px)); }
            #pause-btn { width: 42px; height: 42px; font-size: 18px; bottom: calc(15px + env(safe-area-inset-bottom, 0px)); right: 15px; }
            #lizard-container { width: 90px; height: 60px; margin-top: 6px; }
            #lizard-body { width: 75px; height: 42px; }
            .overlay-screen h1 { font-size: 40px; }
            .overlay-screen .subtitle { font-size: 18px; margin-bottom: 25px; }
            .overlay-screen .start-btn { font-size: 22px; padding: 12px 35px; }
            #instructions { font-size: 11px; bottom: calc(10px + env(safe-area-inset-bottom, 0px)); }
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="tongue-canvas"></canvas>

        <div id="ui-overlay">
            <div id="target-word"></div>
            <div id="lizard-container">
                <div id="lizard-body">
                    <div class="lizard-eye left">
                        <div class="lizard-pupil" id="pupil-left"></div>
                    </div>
                    <div class="lizard-eye right">
                        <div class="lizard-pupil" id="pupil-right"></div>
                    </div>
                    <div id="lizard-mouth"></div>
                    <div class="lizard-foot fl"></div>
                    <div class="lizard-foot fr"></div>
                </div>
            </div>
        </div>

        <div id="score-display">0 ⭐</div>
        <div id="level-display">שלב 1</div>
        <div id="timer-display">4:00</div>
        <div id="progress-display">⭐ 0 / 0</div>
        <div id="feedback-overlay"></div>
        <div id="pause-overlay">⏸ מושהה</div>
        <button id="pause-btn" style="display:none;">⏸</button>

        <div id="instructions">גרור כדי לסובב את החדר | לחץ על החפץ הנכון</div>

        <div id="start-screen" class="overlay-screen">
            <h1>🦎 משחק הלשון</h1>
            <div class="subtitle">מצא את כל החפצים בחדר לפני שהזמן נגמר!</div>
            <input
                id="player-name-input"
                type="text"
                placeholder="הכנס את שמך"
                maxlength="20"
                style="margin-bottom:16px;padding:10px 18px;font-size:20px;border-radius:12px;border:2px solid rgba(255,200,0,0.6);background:rgba(0,0,0,0.5);color:#fff;text-align:center;direction:rtl;outline:none;width:220px;"
            />
            <div class="start-btn" id="start-btn">לחץ להתחיל</div>
            <div class="start-btn" id="resume-btn" style="display:none;font-size:22px;padding:10px 30px;margin-top:8px;border-color:rgba(100,220,100,0.7);color:#aaffaa;">המשך משלב <span id="resume-level-text"></span></div>
        </div>

        <div id="level-complete-screen" class="overlay-screen" style="display:none">
            <h1>🎉 כל הכבוד!</h1>
            <div class="subtitle" id="level-complete-text">סיימת את שלב 1!</div>
            <div class="start-btn" id="next-level-btn">שלב הבא ←</div>
        </div>

        <div id="game-over-screen" class="overlay-screen" style="display:none">
            <h1>⏰ הזמן נגמר!</h1>
            <div class="subtitle" id="game-over-text">הגעת לשלב 1</div>
            <div class="start-btn" id="restart-btn">התחל מחדש</div>
        </div>
    </div>

        // ===== EMOJI SPRITES =====
        function createEmojiTexture(emoji) {
            const size = 128;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.font = `${size * 0.75}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, size / 2, size / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            return texture;
        }

        function createObjectSprite(item) {
            const texture = createEmojiTexture(item.emoji);
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(0.85, 0.85, 1);
            sprite.userData = { item };
            return sprite;
        }

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        // Generate enough positions for any count, adding procedural ones if needed
        function generatePositions(count) {
            const base = shuffle([...POSITIONS]);
            if (count <= base.length) return base.slice(0, count);

            // Heights weighted toward floor for natural feel
            const heights = [0.5, 0.5, 0.5, 0.5, 1.85, 2.5, 3.5, 4.5];
            const all = [...base];
            let attempts = 0;

            while (all.length < count && attempts < count * 40) {
                attempts++;
                const y = heights[Math.floor(Math.random() * heights.length)];
                const x = (Math.random() - 0.5) * 13; // within ±6.5
                const z = (Math.random() - 0.5) * 13;
                // Ensure minimum spacing in the horizontal plane
                const tooClose = all.some(p => Math.hypot(p.x - x, p.z - z) < 1.2);
                if (!tooClose) all.push({ x, y, z });
            }
            return all.slice(0, count);
        }

        // ===== LEVEL CONFIGURATION =====
        function getLevelConfig(level) {
            const toyCount = Math.min(20 + (level - 1) * 10, 200);
            // Seconds per toy decreases as levels increase (harder pressure)
            const secondsPerToy = Math.max(12 - (level - 1) * 0.4, 4);
            return { toyCount, timeLimit: Math.round(toyCount * secondsPerToy) };
        }

        // ===== UI UPDATERS =====
        function updateTimerDisplay() {
            const secs = Math.ceil(state.timeRemaining);
            const m = Math.floor(secs / 60);
            const s = secs % 60;
            timerEl.textContent = `${m}:${String(s).padStart(2, '0')}`;
            if (state.timeRemaining < 30) {
                timerEl.classList.add('urgent');
            } else {
                timerEl.classList.remove('urgent');
            }
        }

        function updateProgressDisplay() {
            progressEl.textContent = `⭐ ${state.levelCaughtObjects} / ${state.levelTotalObjects}`;
        }

        // ===== PAUSE =====
        function togglePause() {
            if (!state.started || (!state.timerActive && !state.paused)) return;
            state.paused = !state.paused;
            if (state.paused) {
                state.timerActive = false;
                controls.enabled = false;
                state.objects.forEach(o => { o.sprite.visible = false; });
                pauseOverlay.classList.add('visible');
                pauseBtn.textContent = '▶';
            } else {
                state.timerActive = true;
                controls.enabled = true;
                state.objects.forEach(o => {
                    if (o !== state.hitObject) o.sprite.visible = true;
                });
                pauseOverlay.classList.remove('visible');
                pauseBtn.textContent = '⏸';
            }
        }
        pauseBtn.addEventListener('click', (e) => { e.stopPropagation(); togglePause(); });

        // ===== PICK NEXT TARGET FROM REMAINING OBJECTS =====
        function pickNewTarget() {
            if (state.objects.length === 0) {
                showLevelComplete();
                return;
            }
            // Avoid repeating the same word if possible
            const pool = state.objects.filter(o => o.item.hebrew !== state.prevTargetHebrew);
            const pick = pool.length > 0 ? pool : state.objects;
            state.targetItem = pick[Math.floor(Math.random() * pick.length)].item;
            state.prevTargetHebrew = state.targetItem.hebrew;
            targetWordEl.textContent = state.targetItem.hebrew;
            targetWordEl.classList.add('visible');
            updateProgressDisplay();
        }

        // ===== START LEVEL =====
        function startLevel(level) {
            // Hide any overlay screens
            levelCompleteScreen.style.display = 'none';
            gameOverScreen.style.display = 'none';

            state.level = level;

            // שמירת התקדמות לחזרה לאחר יציאה
            const _pName = (playerNameInput && playerNameInput.value.trim()) || 'אנונימי';
            localStorage.setItem('tongue_saved_game', JSON.stringify({
                level: level,
                score: state.score,
                playerName: _pName
            }));

            state.tongueState = 'idle';
            state.tongueProgress = 0;
            state.hitObject = null;
            state.prevTargetHebrew = null;

            const { toyCount, timeLimit } = getLevelConfig(level);

            // Remove old sprites
            state.objects.forEach(o => scene.remove(o.sprite));
            state.objects = [];

            // Pick toyCount unique items
            const shuffledItems = shuffle(ITEMS).slice(0, toyCount);

            // Place them with generated positions
            const positions = generatePositions(toyCount);
            shuffledItems.forEach((item, i) => {
                const sprite = createObjectSprite(item);
                const pos = positions[i];
                sprite.position.set(pos.x, pos.y, pos.z);
                scene.add(sprite);
                state.objects.push({
                    item, sprite,
                    originalPos: new THREE.Vector3(pos.x, pos.y, pos.z),
                });
            });

            // Set level state
            state.levelTotalObjects = toyCount;
            state.levelCaughtObjects = 0;
            state.timeRemaining = timeLimit;
            state.timerActive = true;
            state.started = true;

            // Update UI
            levelEl.textContent = `שלב ${level}`;
            updateTimerDisplay();
            pickNewTarget();
            // Show pause button
            state.paused = false;
            pauseBtn.style.display = 'flex';
            pauseBtn.textContent = '⏸';
            pauseOverlay.classList.remove('visible');
        }

        // ===== LEVEL COMPLETE =====
        function showLevelComplete() {
            state.timerActive = false;
            state.paused = false;
            targetWordEl.classList.remove('visible');
            levelCompleteText.textContent = `סיימת את שלב ${state.level}! 🎉`;
            levelCompleteScreen.style.display = 'flex';
            pauseBtn.style.display = 'none';
            pauseOverlay.classList.remove('visible');
        }

        // ===== GAME OVER =====
        function showGameOver() {
            state.timerActive = false;
            state.paused = false;
            state.tongueState = 'idle';
            localStorage.removeItem('tongue_saved_game');
            targetWordEl.classList.remove('visible');
            gameOverText.textContent = `הגעת לשלב ${state.level} | ניקוד: ${state.score} ⭐`;
            gameOverScreen.style.display = 'flex';
            pauseBtn.style.display = 'none';
            pauseOverlay.classList.remove('visible');

            // Submit score to parent Next.js app via postMessage
            const playerName = (playerNameInput && playerNameInput.value.trim()) || 'אנונימי';
            window.parent.postMessage({
                type: 'GAME_OVER',
                player_name: playerName,
                score: state.score,
                max_level: state.level,
            }, '*');

            // Save personal best to localStorage
            const prevBest = parseInt(localStorage.getItem('tongue_best_score') || '0', 10);
            if (state.score > prevBest) {
                localStorage.setItem('tongue_best_score', state.score.toString());
                localStorage.setItem('tongue_best_level', state.level.toString());
                gameOverText.textContent += ' 🏆 שיא אישי!';
            } else if (prevBest > 0) {
                gameOverText.textContent += ` | שיא: ${prevBest} ⭐`;
            }
        }

        // ===== RAYCASTER =====
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function onGameClick(event) {
            if (!state.started || state.tongueState !== 'idle' || state.isDragging) return;
            if (!state.timerActive || state.paused) return; // Don't allow clicks on overlay screens or when paused

            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const sprites = state.objects.map(o => o.sprite);
            const intersects = raycaster.intersectObjects(sprites);

            if (intersects.length > 0) {
                const hitSprite = intersects[0].object;
                const hitObj = state.objects.find(o => o.sprite === hitSprite);
                if (!hitObj) return;

                state.hitObject = hitObj;

                // Project 3D position to 2D screen
                const vec = hitSprite.position.clone();
                vec.project(camera);
                state.tongueTarget2D = {
                    x: (vec.x * 0.5 + 0.5) * window.innerWidth,
                    y: (-vec.y * 0.5 + 0.5) * window.innerHeight,
                };

                state.tongueState = 'extending';
                state.tongueProgress = 0;
            }
        }

        renderer.domElement.addEventListener('click', onGameClick);

        // Explicit touch support for mobile (touchend fires before click delay)
        renderer.domElement.addEventListener('touchend', (e) => {
            e.preventDefault();
            if (!state.isDragging && e.changedTouches.length > 0) {
                const t = e.changedTouches[0];
                onGameClick({ clientX: t.clientX, clientY: t.clientY });
            }
        }, { passive: false });

        // ===== TONGUE ANIMATION =====
        function getMouthScreenPos() {
            const rect = lizardMouth.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2,
            };
        }

        function updateTongue(dt) {
            if (state.tongueState === 'idle') return;

            if (state.tongueState === 'extending') {
                state.tongueProgress += TONGUE_SPEED * dt;
                if (state.tongueProgress >= 1) {
                    state.tongueProgress = 1;
                    // Check if correct
                    const hitItem = state.hitObject.item;
                    if (hitItem.hebrew === state.targetItem.hebrew) {
                        showFeedback('correct');
                        state.score++;
                        scoreEl.textContent = state.score + ' ⭐';
                        state.levelCaughtObjects++;
                    } else {
                        showFeedback('wrong');
                    }
                    state.tongueState = 'retracting';
                }
            } else if (state.tongueState === 'retracting') {
                state.tongueProgress -= TONGUE_RETRACT_SPEED * dt;
                if (state.tongueProgress <= 0) {
                    state.tongueProgress = 0;
                    state.tongueState = 'idle';

                    const wasCorrect = state.hitObject &&
                        state.hitObject.item.hebrew === state.targetItem.hebrew;

                    if (wasCorrect) {
                        // Remove caught toy from scene and list
                        scene.remove(state.hitObject.sprite);
                        state.objects = state.objects.filter(o => o !== state.hitObject);
                    }
                    state.hitObject = null;

                    if (wasCorrect) {
                        pickNewTarget(); // may trigger showLevelComplete() if room empty
                    }
                }
            }
        }

        function drawTongue() {
            tongueCtx.clearRect(0, 0, tongueCanvas.width, tongueCanvas.height);
            if (state.tongueState === 'idle' || !state.tongueTarget2D) return;

            const mouth = getMouthScreenPos();
            const target = state.tongueTarget2D;
            const dpr = window.devicePixelRatio || 1;

            const tipX = mouth.x + (target.x - mouth.x) * state.tongueProgress;
            const tipY = mouth.y + (target.y - mouth.y) * state.tongueProgress;

            // Tongue line
            tongueCtx.save();
            tongueCtx.lineWidth = 6 * dpr;
            tongueCtx.strokeStyle = '#E84057';
            tongueCtx.lineCap = 'round';
            tongueCtx.beginPath();
            tongueCtx.moveTo(mouth.x * dpr, mouth.y * dpr);
            tongueCtx.lineTo(tipX * dpr, tipY * dpr);
            tongueCtx.stroke();

            // Tongue tip
            tongueCtx.fillStyle = '#C62828';
            tongueCtx.beginPath();
            tongueCtx.arc(tipX * dpr, tipY * dpr, 8 * dpr, 0, Math.PI * 2);
            tongueCtx.fill();

            // If retracting after correct hit, draw emoji following tongue
            if (state.tongueState === 'retracting' && state.hitObject &&
                state.hitObject.item.hebrew === state.targetItem.hebrew) {
                tongueCtx.font = `${40 * dpr}px serif`;
                tongueCtx.textAlign = 'center';
                tongueCtx.textBaseline = 'middle';
                tongueCtx.fillText(state.hitObject.item.emoji, tipX * dpr, tipY * dpr);
                // Hide the 3D sprite while retracting
                state.hitObject.sprite.visible = false;
            }

            tongueCtx.restore();
        }

        // ===== FEEDBACK =====
        function showFeedback(type) {
            if (state.feedbackTimeout) clearTimeout(state.feedbackTimeout);
            feedbackEl.className = type;
            state.feedbackTimeout = setTimeout(() => {
                feedbackEl.className = '';
            }, 300);
        }

        // ===== EYE TRACKING =====
        function updateEyes(mouseX, mouseY) {
            const maxOffset = 4;
            [pupilLeft, pupilRight].forEach(pupil => {
                const eyeRect = pupil.parentElement.getBoundingClientRect();
                const eyeCX = eyeRect.left + eyeRect.width / 2;
                const eyeCY = eyeRect.top + eyeRect.height / 2;
                const dx = mouseX - eyeCX;
                const dy = mouseY - eyeCY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const clamp = Math.min(dist, maxOffset * 20) / (maxOffset * 20) * maxOffset;
                const ox = (dx / (dist || 1)) * clamp;
                const oy = (dy / (dist || 1)) * clamp;
                pupil.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
            });
        }

        window.addEventListener('mousemove', (e) => updateEyes(e.clientX, e.clientY));

        // ===== RESIZE =====
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);

            const dpr = window.devicePixelRatio || 1;
            tongueCanvas.width = w * dpr;
            tongueCanvas.height = h * dpr;
            tongueCanvas.style.width = w + 'px';
            tongueCanvas.style.height = h + 'px';
        }
        window.addEventListener('resize', onResize);
        onResize();

        // ===== GAME LOOP =====
        let lastTime = 0;
        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            const dt = Math.min((time - lastTime) / 16.67, 3); // normalize to ~60fps
            lastTime = time;

            if (!state.started) {
                renderer.render(scene, camera);
                return;
            }

            // Timer countdown
            if (state.timerActive && dt > 0) {
                state.timeRemaining -= dt / 60; // dt/60 = actual seconds per frame
                if (state.timeRemaining <= 0) {
                    state.timeRemaining = 0;
                    state.timerActive = false;
                    updateTimerDisplay();
                    showGameOver();
                } else {
                    updateTimerDisplay();
                }
            }

            controls.update();
            updateTongue(dt);
            renderer.render(scene, camera);
            drawTongue();
        }

        // ===== INIT =====
        buildRoom();

        // Show room preview behind start screen
        renderer.render(scene, camera);

        // Load saved name from localStorage
        const savedName = localStorage.getItem('tongue_player_name');
        if (savedName && playerNameInput) {
            playerNameInput.value = savedName;
        }

        // בדיקת משחק שמור — הצגת כפתור המשך אם קיים
        const savedGame = localStorage.getItem('tongue_saved_game');
        const resumeBtn = document.getElementById('resume-btn');
        const resumeLevelText = document.getElementById('resume-level-text');
        if (savedGame && resumeBtn) {
            try {
                const parsed = JSON.parse(savedGame);
                if (parsed.level > 1 || parsed.score > 0) {
                    resumeLevelText.textContent = parsed.level;
                    resumeBtn.style.display = 'block';
                    if (parsed.playerName && playerNameInput && !playerNameInput.value.trim()) {
                        playerNameInput.value = parsed.playerName;
                    }
                }
            } catch(e) { localStorage.removeItem('tongue_saved_game'); }
        }

        // מאזין לכפתור המשך
        if (resumeBtn) {
            resumeBtn.addEventListener('click', () => {
                const saved = JSON.parse(localStorage.getItem('tongue_saved_game') || '{}');
                if (!saved.level) return;
                const name = (playerNameInput && playerNameInput.value.trim()) || saved.playerName || 'אנונימי';
                if (!name) {
                    playerNameInput.style.border = '2px solid #ff4444';
                    return;
                }
                localStorage.setItem('tongue_player_name', name);
                state.score = saved.score || 0;
                startScreen.style.display = 'none';
                startLevel(saved.level);
                instructionsEl.classList.add('visible');
                setTimeout(() => instructionsEl.classList.remove('visible'), 4000);
            });
        }

        // Start screen - use button to avoid triggering on input click
        startBtn.addEventListener('click', () => {
            if (playerNameInput && !playerNameInput.value.trim()) {
                playerNameInput.style.border = '2px solid #ff4444';
                playerNameInput.placeholder = 'חובה להכניס שם!';
                setTimeout(() => {
                    playerNameInput.style.border = '2px solid rgba(255,200,0,0.6)';
                    playerNameInput.placeholder = 'הכנס את שמך';
                }, 1500);
                return;
            }
            // Save name for next time
            localStorage.setItem('tongue_player_name', playerNameInput.value.trim());
            startScreen.style.display = 'none';
            startLevel(1);
            instructionsEl.classList.add('visible');
            setTimeout(() => instructionsEl.classList.remove('visible'), 4000);
        });

        // Level complete → next level
        nextLevelBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            startLevel(state.level + 1);
        });
        levelCompleteScreen.addEventListener('click', () => {
            startLevel(state.level + 1);
        });

        // Game over → restart from level 1
        restartBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            state.score = 0;
            scoreEl.textContent = '0 ⭐';
            startLevel(1);
        });
        gameOverScreen.addEventListener('click', () => {
            state.score = 0;
            scoreEl.textContent = '0 ⭐';
            startLevel(1);
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
