<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>משחק הלשון 🦎</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #1a1a2e; font-family: 'Segoe UI', Tahoma, Arial, sans-serif; }

        #game-container { position: relative; width: 100vw; height: 100vh; }

        #three-canvas { display: block; width: 100%; height: 100%; }

        #tongue-canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 10;
        }

        #ui-overlay {
            position: absolute; top: 0; left: 0; right: 0;
            pointer-events: none; z-index: 20;
            display: flex; flex-direction: column; align-items: center;
        }

        #target-word {
            margin-top: 15px; padding: 12px 40px;
            background: rgba(0,0,0,0.7); border-radius: 20px;
            color: #fff; font-size: 44px; font-weight: bold;
            text-shadow: 0 0 20px rgba(255,200,0,0.5);
            border: 2px solid rgba(255,200,0,0.4);
            direction: rtl; user-select: none;
            opacity: 0; transition: opacity 0.3s;
        }
        #target-word.visible { opacity: 1; }

        #lizard-container {
            margin-top: 10px; position: relative;
            width: 120px; height: 80px; user-select: none;
        }

        #lizard-body {
            width: 100px; height: 55px;
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            border-radius: 50% 50% 45% 45%;
            position: absolute; bottom: 0; left: 50%;
            transform: translateX(-50%);
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            animation: lizardBob 2s ease-in-out infinite;
        }

        @keyframes lizardBob {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(3px); }
        }

        .lizard-eye {
            width: 18px; height: 20px;
            background: white; border-radius: 50%;
            position: absolute; top: 5px;
            box-shadow: inset 0 0 3px rgba(0,0,0,0.2);
        }
        .lizard-eye.left { left: 18px; }
        .lizard-eye.right { right: 18px; }

        .lizard-pupil {
            width: 9px; height: 11px;
            background: #1a1a1a; border-radius: 50%;
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
        }

        #lizard-mouth {
            width: 8px; height: 8px;
            background: #E84057;
            border-radius: 50%;
            position: absolute; bottom: -2px; left: 50%;
            transform: translateX(-50%);
        }

        .lizard-foot {
            width: 14px; height: 8px;
            background: #388E3C;
            border-radius: 50%;
            position: absolute; bottom: -4px;
        }
        .lizard-foot.fl { left: 5px; }
        .lizard-foot.fr { right: 5px; }

        #score-display {
            position: absolute; top: 15px; left: 20px;
            color: #FFD700; font-size: 28px; font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 20; user-select: none; direction: ltr;
        }

        #feedback-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 15; pointer-events: none;
            opacity: 0; transition: opacity 0.15s;
        }
        #feedback-overlay.wrong { background: rgba(255,0,0,0.2); opacity: 1; }
        #feedback-overlay.correct { background: rgba(0,255,0,0.15); opacity: 1; }

        #start-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,10,30,0.92); z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer; user-select: none;
        }
        #start-screen h1 {
            font-size: 64px; color: #4CAF50;
            text-shadow: 0 0 30px rgba(76,175,80,0.5);
            margin-bottom: 10px;
        }
        #start-screen .subtitle {
            font-size: 28px; color: #aaa;
            margin-bottom: 40px;
        }
        #start-screen .start-btn {
            font-size: 32px; color: #FFD700;
            padding: 15px 50px;
            border: 2px solid #FFD700;
            border-radius: 15px;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.05); opacity: 0.8; }
        }

        #instructions {
            position: absolute; bottom: 20px; left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5); font-size: 14px;
            z-index: 20; user-select: none; pointer-events: none;
            text-align: center; direction: rtl;
            opacity: 0; transition: opacity 0.5s;
        }
        #instructions.visible { opacity: 1; }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="tongue-canvas"></canvas>

        <div id="ui-overlay">
            <div id="target-word"></div>
            <div id="lizard-container">
                <div id="lizard-body">
                    <div class="lizard-eye left">
                        <div class="lizard-pupil" id="pupil-left"></div>
                    </div>
                    <div class="lizard-eye right">
                        <div class="lizard-pupil" id="pupil-right"></div>
                    </div>
                    <div id="lizard-mouth"></div>
                    <div class="lizard-foot fl"></div>
                    <div class="lizard-foot fr"></div>
                </div>
            </div>
        </div>

        <div id="score-display">0 ⭐</div>
        <div id="feedback-overlay"></div>

        <div id="instructions">גרור כדי לסובב את החדר | לחץ על החפץ הנכון</div>

        <div id="start-screen">
            <h1>🦎 משחק הלשון</h1>
            <div class="subtitle">מצא את החפץ הנכון!</div>
            <div class="start-btn">לחץ להתחיל</div>
        </div>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // ===== ITEMS =====
        const ITEMS = [
            { hebrew: "כדור",     emoji: "⚽" },
            { hebrew: "ספר",      emoji: "📖" },
            { hebrew: "כוס",      emoji: "🥤" },
            { hebrew: "מפתח",     emoji: "🔑" },
            { hebrew: "שעון",     emoji: "⏰" },
            { hebrew: "נר",       emoji: "🕯️" },
            { hebrew: "תפוח",     emoji: "🍎" },
            { hebrew: "כובע",     emoji: "🎩" },
            { hebrew: "נעל",      emoji: "👟" },
            { hebrew: "עיפרון",   emoji: "✏️" },
            { hebrew: "מספריים",  emoji: "✂️" },
            { hebrew: "טלפון",    emoji: "📱" },
            { hebrew: "מברשת",    emoji: "🪥" },
            { hebrew: "כרית",     emoji: "🛏️" },
            { hebrew: "מנורה",    emoji: "💡" },
            { hebrew: "בקבוק",    emoji: "🍼" },
            { hebrew: "עוגה",     emoji: "🎂" },
            { hebrew: "פרח",      emoji: "🌸" },
            { hebrew: "דג",       emoji: "🐟" },
            { hebrew: "לב",       emoji: "❤️" },
        ];

        // ===== CONFIG =====
        const ROOM_SIZE = 8;
        const OBJECTS_PER_ROUND = 7;
        const TONGUE_SPEED = 0.06;
        const TONGUE_RETRACT_SPEED = 0.08;

        // ===== DOM =====
        const container = document.getElementById('game-container');
        const tongueCanvas = document.getElementById('tongue-canvas');
        const tongueCtx = tongueCanvas.getContext('2d');
        const targetWordEl = document.getElementById('target-word');
        const scoreEl = document.getElementById('score-display');
        const feedbackEl = document.getElementById('feedback-overlay');
        const startScreen = document.getElementById('start-screen');
        const instructionsEl = document.getElementById('instructions');
        const lizardMouth = document.getElementById('lizard-mouth');
        const pupilLeft = document.getElementById('pupil-left');
        const pupilRight = document.getElementById('pupil-right');

        // ===== STATE =====
        const state = {
            started: false,
            score: 0,
            objects: [],        // { item, sprite, x, y, z }
            targetItem: null,
            prevTargetHebrew: null,
            tongueState: 'idle', // idle | extending | retracting
            tongueProgress: 0,
            tongueTarget2D: null,
            tongueTarget3D: null,
            hitObject: null,
            feedbackTimeout: null,
            isDragging: false,
        };

        // ===== THREE.JS SETUP =====
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87CEEB);
        scene.fog = new THREE.Fog(0x87CEEB, 15, 25);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 4, 8);
        camera.lookAt(0, 1, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.insertBefore(renderer.domElement, container.firstChild);

        // ===== CONTROLS =====
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableZoom = false;
        controls.enablePan = false;
        controls.minPolarAngle = Math.PI * 0.15;
        controls.maxPolarAngle = Math.PI * 0.55;
        controls.target.set(0, 1.5, 0);
        controls.rotateSpeed = 0.5;
        controls.dampingFactor = 0.08;
        controls.enableDamping = true;

        // Track dragging to distinguish from clicks
        renderer.domElement.addEventListener('pointerdown', () => { state.isDragging = false; });
        renderer.domElement.addEventListener('pointermove', () => { state.isDragging = true; });

        // ===== LIGHTING =====
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
        dirLight.position.set(3, 8, 5);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.set(1024, 1024);
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 20;
        dirLight.shadow.camera.left = -6;
        dirLight.shadow.camera.right = 6;
        dirLight.shadow.camera.top = 6;
        dirLight.shadow.camera.bottom = -6;
        scene.add(dirLight);

        const pointLight = new THREE.PointLight(0xFFE4B5, 0.4, 15);
        pointLight.position.set(-2, 4, 0);
        scene.add(pointLight);

        // ===== BUILD ROOM =====
        function buildRoom() {
            // Floor
            const floorGeo = new THREE.PlaneGeometry(ROOM_SIZE * 2, ROOM_SIZE * 2);
            const floorMat = new THREE.MeshStandardMaterial({
                color: 0x8B6914, roughness: 0.8, metalness: 0.1
            });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Floor planks (subtle lines)
            for (let i = -ROOM_SIZE; i <= ROOM_SIZE; i += 1.2) {
                const lineGeo = new THREE.PlaneGeometry(ROOM_SIZE * 2, 0.02);
                const lineMat = new THREE.MeshBasicMaterial({ color: 0x7A5C10 });
                const line = new THREE.Mesh(lineGeo, lineMat);
                line.rotation.x = -Math.PI / 2;
                line.position.set(0, 0.005, i);
                scene.add(line);
            }

            // Back wall
            const wallGeo = new THREE.PlaneGeometry(ROOM_SIZE * 2, ROOM_SIZE);
            const wallMat = new THREE.MeshStandardMaterial({
                color: 0xF5E6CA, roughness: 0.9, metalness: 0
            });
            const backWall = new THREE.Mesh(wallGeo, wallMat);
            backWall.position.set(0, ROOM_SIZE / 2, -ROOM_SIZE);
            backWall.receiveShadow = true;
            scene.add(backWall);

            // Left wall
            const leftWall = new THREE.Mesh(wallGeo, wallMat.clone());
            leftWall.position.set(-ROOM_SIZE, ROOM_SIZE / 2, 0);
            leftWall.rotation.y = Math.PI / 2;
            leftWall.receiveShadow = true;
            scene.add(leftWall);

            // Right wall
            const rightWall = new THREE.Mesh(wallGeo, wallMat.clone());
            rightWall.position.set(ROOM_SIZE, ROOM_SIZE / 2, 0);
            rightWall.rotation.y = -Math.PI / 2;
            rightWall.receiveShadow = true;
            scene.add(rightWall);

            // Baseboard
            const baseGeo = new THREE.BoxGeometry(ROOM_SIZE * 2, 0.2, 0.05);
            const baseMat = new THREE.MeshStandardMaterial({ color: 0x5D4037 });
            const baseBack = new THREE.Mesh(baseGeo, baseMat);
            baseBack.position.set(0, 0.1, -ROOM_SIZE + 0.025);
            scene.add(baseBack);

            // Window on back wall
            const windowFrame = new THREE.Mesh(
                new THREE.BoxGeometry(2, 1.5, 0.1),
                new THREE.MeshStandardMaterial({ color: 0xDEB887 })
            );
            windowFrame.position.set(0, 3, -ROOM_SIZE + 0.06);
            scene.add(windowFrame);

            const windowGlass = new THREE.Mesh(
                new THREE.PlaneGeometry(1.6, 1.1),
                new THREE.MeshBasicMaterial({ color: 0x87CEEB, transparent: true, opacity: 0.6 })
            );
            windowGlass.position.set(0, 3, -ROOM_SIZE + 0.12);
            scene.add(windowGlass);

            // Simple table
            const tableMat = new THREE.MeshStandardMaterial({ color: 0x6D4C2A });
            const tableTop = new THREE.Mesh(new THREE.BoxGeometry(3, 0.1, 1.5), tableMat);
            tableTop.position.set(-2.5, 1.2, -2);
            tableTop.castShadow = true;
            tableTop.receiveShadow = true;
            scene.add(tableTop);

            // Table legs
            const legGeo = new THREE.BoxGeometry(0.1, 1.2, 0.1);
            [[-3.9, -2.65], [-3.9, -1.35], [-1.1, -2.65], [-1.1, -1.35]].forEach(([x, z]) => {
                const leg = new THREE.Mesh(legGeo, tableMat);
                leg.position.set(x, 0.6, z);
                leg.castShadow = true;
                scene.add(leg);
            });

            // Shelf on right wall
            const shelfMat = new THREE.MeshStandardMaterial({ color: 0x8B7355 });
            const shelf = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 2.5), shelfMat);
            shelf.position.set(ROOM_SIZE - 0.15, 2.2, -1);
            shelf.castShadow = true;
            scene.add(shelf);

            const shelf2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.08, 2), shelfMat);
            shelf2.position.set(ROOM_SIZE - 0.15, 3.2, 1);
            shelf2.castShadow = true;
            scene.add(shelf2);
        }

        // ===== EMOJI SPRITES =====
        function createEmojiTexture(emoji) {
            const size = 128;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');
            ctx.font = `${size * 0.75}px serif`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(emoji, size / 2, size / 2);
            const texture = new THREE.CanvasTexture(canvas);
            texture.minFilter = THREE.LinearFilter;
            return texture;
        }

        function createObjectSprite(item) {
            const texture = createEmojiTexture(item.emoji);
            const material = new THREE.SpriteMaterial({
                map: texture,
                transparent: true,
                depthTest: true,
                depthWrite: false,
            });
            const sprite = new THREE.Sprite(material);
            sprite.scale.set(1.2, 1.2, 1);
            sprite.userData = { item };
            return sprite;
        }

        // ===== OBJECT PLACEMENT =====
        // Predefined positions in the room (floor, table, shelves)
        const POSITIONS = [
            // Floor positions
            { x: -1, y: 0.6, z: -1 },
            { x: 1.5, y: 0.6, z: -2 },
            { x: 0, y: 0.6, z: 1 },
            { x: -3, y: 0.6, z: 1.5 },
            { x: 3, y: 0.6, z: 0 },
            { x: -1.5, y: 0.6, z: 3 },
            { x: 2, y: 0.6, z: 2.5 },
            { x: -4, y: 0.6, z: -3 },
            // Table positions
            { x: -3.2, y: 1.9, z: -2 },
            { x: -2.5, y: 1.9, z: -1.8 },
            { x: -1.8, y: 1.9, z: -2.2 },
            // Right shelf positions
            { x: ROOM_SIZE - 0.6, y: 2.8, z: -1.5 },
            { x: ROOM_SIZE - 0.6, y: 2.8, z: -0.5 },
            { x: ROOM_SIZE - 0.6, y: 3.8, z: 0.5 },
            { x: ROOM_SIZE - 0.6, y: 3.8, z: 1.5 },
        ];

        function shuffle(arr) {
            const a = [...arr];
            for (let i = a.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [a[i], a[j]] = [a[j], a[i]];
            }
            return a;
        }

        function placeObjects() {
            // Remove old sprites
            state.objects.forEach(o => scene.remove(o.sprite));
            state.objects = [];

            // Pick target
            let available = ITEMS.filter(i => i.hebrew !== state.prevTargetHebrew);
            state.targetItem = available[Math.floor(Math.random() * available.length)];
            state.prevTargetHebrew = state.targetItem.hebrew;

            // Pick other items
            let others = shuffle(ITEMS.filter(i => i.hebrew !== state.targetItem.hebrew))
                .slice(0, OBJECTS_PER_ROUND - 1);
            let allItems = shuffle([state.targetItem, ...others]);

            // Place them
            let positions = shuffle(POSITIONS).slice(0, allItems.length);
            allItems.forEach((item, i) => {
                const sprite = createObjectSprite(item);
                const pos = positions[i];
                sprite.position.set(pos.x, pos.y, pos.z);
                scene.add(sprite);
                state.objects.push({
                    item, sprite,
                    originalPos: new THREE.Vector3(pos.x, pos.y, pos.z),
                });
            });

            // Update UI
            targetWordEl.textContent = state.targetItem.hebrew;
            targetWordEl.classList.add('visible');
        }

        // ===== RAYCASTER =====
        const raycaster = new THREE.Raycaster();
        const pointer = new THREE.Vector2();

        function onGameClick(event) {
            if (!state.started || state.tongueState !== 'idle' || state.isDragging) return;

            const rect = renderer.domElement.getBoundingClientRect();
            pointer.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            pointer.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;

            raycaster.setFromCamera(pointer, camera);
            const sprites = state.objects.map(o => o.sprite);
            const intersects = raycaster.intersectObjects(sprites);

            if (intersects.length > 0) {
                const hitSprite = intersects[0].object;
                const hitObj = state.objects.find(o => o.sprite === hitSprite);
                if (!hitObj) return;

                state.hitObject = hitObj;

                // Project 3D position to 2D screen
                const vec = hitSprite.position.clone();
                vec.project(camera);
                state.tongueTarget2D = {
                    x: (vec.x * 0.5 + 0.5) * window.innerWidth,
                    y: (-vec.y * 0.5 + 0.5) * window.innerHeight,
                };

                state.tongueState = 'extending';
                state.tongueProgress = 0;
            }
        }

        renderer.domElement.addEventListener('click', onGameClick);

        // ===== TONGUE ANIMATION =====
        function getMouthScreenPos() {
            const rect = lizardMouth.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2,
            };
        }

        function updateTongue(dt) {
            if (state.tongueState === 'idle') return;

            if (state.tongueState === 'extending') {
                state.tongueProgress += TONGUE_SPEED * dt;
                if (state.tongueProgress >= 1) {
                    state.tongueProgress = 1;
                    // Check if correct
                    const hitItem = state.hitObject.item;
                    if (hitItem.hebrew === state.targetItem.hebrew) {
                        showFeedback('correct');
                        state.score++;
                        scoreEl.textContent = state.score + ' ⭐';
                    } else {
                        showFeedback('wrong');
                    }
                    state.tongueState = 'retracting';
                }
            } else if (state.tongueState === 'retracting') {
                state.tongueProgress -= TONGUE_RETRACT_SPEED * dt;
                if (state.tongueProgress <= 0) {
                    state.tongueProgress = 0;
                    state.tongueState = 'idle';

                    // If was correct, new round
                    const wasCorrect = state.hitObject &&
                        state.hitObject.item.hebrew === state.targetItem.hebrew;
                    state.hitObject = null;
                    if (wasCorrect) {
                        placeObjects();
                    }
                }
            }
        }

        function drawTongue() {
            tongueCtx.clearRect(0, 0, tongueCanvas.width, tongueCanvas.height);
            if (state.tongueState === 'idle' || !state.tongueTarget2D) return;

            const mouth = getMouthScreenPos();
            const target = state.tongueTarget2D;
            const dpr = window.devicePixelRatio || 1;

            const tipX = mouth.x + (target.x - mouth.x) * state.tongueProgress;
            const tipY = mouth.y + (target.y - mouth.y) * state.tongueProgress;

            // Tongue line
            tongueCtx.save();
            tongueCtx.lineWidth = 6 * dpr;
            tongueCtx.strokeStyle = '#E84057';
            tongueCtx.lineCap = 'round';
            tongueCtx.beginPath();
            tongueCtx.moveTo(mouth.x * dpr, mouth.y * dpr);
            tongueCtx.lineTo(tipX * dpr, tipY * dpr);
            tongueCtx.stroke();

            // Tongue tip
            tongueCtx.fillStyle = '#C62828';
            tongueCtx.beginPath();
            tongueCtx.arc(tipX * dpr, tipY * dpr, 8 * dpr, 0, Math.PI * 2);
            tongueCtx.fill();

            // If retracting after correct hit, draw emoji following tongue
            if (state.tongueState === 'retracting' && state.hitObject &&
                state.hitObject.item.hebrew === state.targetItem.hebrew) {
                tongueCtx.font = `${40 * dpr}px serif`;
                tongueCtx.textAlign = 'center';
                tongueCtx.textBaseline = 'middle';
                tongueCtx.fillText(state.hitObject.item.emoji, tipX * dpr, tipY * dpr);
                // Hide the 3D sprite while retracting
                state.hitObject.sprite.visible = false;
            }

            tongueCtx.restore();
        }

        // ===== FEEDBACK =====
        function showFeedback(type) {
            if (state.feedbackTimeout) clearTimeout(state.feedbackTimeout);
            feedbackEl.className = type;
            state.feedbackTimeout = setTimeout(() => {
                feedbackEl.className = '';
            }, 300);
        }

        // ===== EYE TRACKING =====
        function updateEyes(mouseX, mouseY) {
            const maxOffset = 4;
            [pupilLeft, pupilRight].forEach(pupil => {
                const eyeRect = pupil.parentElement.getBoundingClientRect();
                const eyeCX = eyeRect.left + eyeRect.width / 2;
                const eyeCY = eyeRect.top + eyeRect.height / 2;
                const dx = mouseX - eyeCX;
                const dy = mouseY - eyeCY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                const clamp = Math.min(dist, maxOffset * 20) / (maxOffset * 20) * maxOffset;
                const ox = (dx / (dist || 1)) * clamp;
                const oy = (dy / (dist || 1)) * clamp;
                pupil.style.transform = `translate(calc(-50% + ${ox}px), calc(-50% + ${oy}px))`;
            });
        }

        window.addEventListener('mousemove', (e) => updateEyes(e.clientX, e.clientY));

        // ===== RESIZE =====
        function onResize() {
            const w = window.innerWidth;
            const h = window.innerHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);

            const dpr = window.devicePixelRatio || 1;
            tongueCanvas.width = w * dpr;
            tongueCanvas.height = h * dpr;
            tongueCanvas.style.width = w + 'px';
            tongueCanvas.style.height = h + 'px';
        }
        window.addEventListener('resize', onResize);
        onResize();

        // ===== GAME LOOP =====
        let lastTime = 0;
        function gameLoop(time) {
            requestAnimationFrame(gameLoop);
            const dt = Math.min((time - lastTime) / 16.67, 3); // normalize to ~60fps
            lastTime = time;

            if (!state.started) {
                renderer.render(scene, camera);
                return;
            }

            controls.update();
            updateTongue(dt);
            renderer.render(scene, camera);
            drawTongue();
        }

        // ===== INIT =====
        buildRoom();

        // Show room preview behind start screen
        renderer.render(scene, camera);

        startScreen.addEventListener('click', () => {
            startScreen.style.display = 'none';
            state.started = true;
            placeObjects();
            instructionsEl.classList.add('visible');
            setTimeout(() => instructionsEl.classList.remove('visible'), 4000);
        });

        requestAnimationFrame(gameLoop);
    </script>
</body>
</html>
